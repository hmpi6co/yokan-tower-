<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ようかんタワー</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { height:100%; overflow:hidden; background:#F2E8D5; touch-action:manipulation; -webkit-user-select:none; user-select:none; }
  canvas { display:block; }
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
let W = 0, H = 0, DPR = 1;

function resize() {
  DPR = Math.min(window.devicePixelRatio || 1, 2);
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = W * DPR; canvas.height = H * DPR;
  canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
resize();
window.addEventListener('resize', resize);

// ---- 和菓子パレット ----
const FLAVORS = [
  { name:'抹茶',   main:'#7FA05B', top:'#9CBA77', side:'#5F7B42' },
  { name:'桜',     main:'#E59BAA', top:'#F2B8C4', side:'#C0707F' },
  { name:'小豆',   main:'#9C5A55', top:'#B57570', side:'#7A403C' },
  { name:'栗',     main:'#CE9D5C', top:'#E0B87E', side:'#A87B41' },
  { name:'黒糖',   main:'#6E4C3B', top:'#8A6450', side:'#523627' },
  { name:'柚子',   main:'#E3C35E', top:'#F0D480', side:'#BC9C3F' },
  { name:'鶯',     main:'#8E9B5B', top:'#A8B478', side:'#6E7A42' },
];

// ---- 背景フェーズ(積むほど空へ) ----
const PHASES = [
  { at:0,  top:[242,232,213], bot:[230,214,186], dark:false }, // 和室の朝
  { at:14, top:[185,216,229], bot:[224,236,238], dark:false }, // 青空
  { at:30, top:[229,179,150], bot:[242,214,170], dark:false }, // 夕焼け
  { at:48, top:[42,48,76],    bot:[78,70,98],    dark:true  }, // 星空
  { at:75, top:[18,16,30],    bot:[48,38,66],    dark:true  }, // 宇宙
];

const BLOCK_H = 44;
const PERFECT_TOL = 7;

let state = 'title'; // title | playing | dying | over
let blocks, current, debris, particles, popups, clouds, stars;
let score, best = 0, combo, cam, camTarget, shake, flash, dieTimer, newBest;

function baseWidth() { return Math.min(W * 0.62, 300); }

function reset() {
  blocks = [{ x:(W - baseWidth())/2, w:baseWidth(), f:FLAVORS[0] }];
  spawnCurrent();
  debris = []; particles = []; popups = [];
  score = 0; combo = 0; cam = 0; camTarget = 0; shake = 0; flash = 0;
  dieTimer = 0; newBest = false;
}

function spawnCurrent() {
  const prev = blocks[blocks.length - 1];
  const fromLeft = blocks.length % 2 === 1;
  const speed = Math.min(150 + blocks.length * 9, 430);
  current = {
    x: fromLeft ? -prev.w : W,
    w: prev.w,
    dir: fromLeft ? 1 : -1,
    speed,
    f: FLAVORS[blocks.length % FLAVORS.length],
  };
}

// 雲と星(背景の彩り)
clouds = Array.from({length:5}, () => ({
  x: Math.random()*1.2 - 0.1, y: Math.random(), s: 0.5 + Math.random(), v: 4 + Math.random()*8
}));
stars = Array.from({length:60}, () => ({
  x: Math.random(), y: Math.random(), r: Math.random()*1.4 + 0.4, tw: Math.random()*6.28
}));

// ---- 入力 ----
function onTap(e) {
  if (e) e.preventDefault();
  if (state === 'title') { reset(); state = 'playing'; return; }
  if (state === 'over')  { reset(); state = 'playing'; return; }
  if (state !== 'playing') return;
  place();
}
canvas.addEventListener('pointerdown', onTap);
window.addEventListener('keydown', e => { if (e.code === 'Space') onTap(); });

function place() {
  const prev = blocks[blocks.length - 1];
  const left  = Math.max(current.x, prev.x);
  const right = Math.min(current.x + current.w, prev.x + prev.w);
  const overlap = right - left;

  if (overlap <= 0) {
    // 失敗 → 落下して終了
    debris.push(makeDebris(current.x, topY(blocks.length), current.w, current.f, current.dir * 60));
    combo = 0; shake = 10;
    state = 'dying'; dieTimer = 0.9;
    return;
  }

  const offset = Math.abs(current.x - prev.x);
  const y = topY(blocks.length);

  if (offset <= PERFECT_TOL) {
    // ぴったり!
    combo++;
    let w = prev.w;
    if (combo >= 2 && w < baseWidth()) w = Math.min(w + 12, baseWidth()); // ご褒美で成長
    const x = prev.x + (prev.w - w) / 2;
    blocks.push({ x, w, f: current.f });
    score += 1 + Math.min(combo, 5);
    flash = 1;
    popups.push({ text: combo >= 3 ? '職人技!' : 'ぴったり!', sub:'+' + (1 + Math.min(combo,5)), x: x + w/2, y, life: 1 });
    burst(x + w/2, y, current.f.top, 18 + combo*4);
    if (navigator.vibrate) navigator.vibrate(20);
  } else {
    // はみ出た分を切り落とす
    if (current.x < prev.x) {
      debris.push(makeDebris(current.x, y, prev.x - current.x, current.f, -40));
    } else {
      debris.push(makeDebris(right, y, (current.x + current.w) - right, current.f, 40));
    }
    blocks.push({ x: left, w: overlap, f: current.f });
    score += 1;
    combo = 0;
    shake = 4;
  }

  spawnCurrent();
  // カメラを上へ
  const topScreen = topY(blocks.length) + cam;
  if (topScreen < H * 0.42) camTarget = cam + (H * 0.42 - topScreen);
}

function makeDebris(x, y, w, f, vx) {
  return { x, y, w, f, vx, vy: -60, vr: (Math.random()-0.5)*5, rot: 0 };
}
function burst(x, y, color, n) {
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2, sp = 60 + Math.random()*180;
    particles.push({ x, y, vx: Math.cos(a)*sp, vy: Math.sin(a)*sp - 80, life: 0.7 + Math.random()*0.4, color });
  }
}

function topY(i) { return H - 90 - (i + 1) * BLOCK_H; } // ブロックiの上端(ワールド座標)

// ---- 更新 ----
let last = performance.now();
function loop(now) {
  const dt = Math.min((now - last) / 1000, 0.05);
  last = now;
  update(dt, now / 1000);
  draw(now / 1000);
  requestAnimationFrame(loop);
}

function update(dt, t) {
  cam += (camTarget - cam) * Math.min(dt * 6, 1);
  shake = Math.max(0, shake - dt * 30);
  flash = Math.max(0, flash - dt * 3);

  clouds.forEach(c => { c.x += c.v * dt / W; if (c.x > 1.15) c.x = -0.2; });

  if (state === 'playing') {
    current.x += current.dir * current.speed * dt;
    if (current.x < -current.w * 0.4) { current.x = -current.w * 0.4; current.dir = 1; }
    if (current.x > W - current.w * 0.6) { current.x = W - current.w * 0.6; current.dir = -1; }
  }
  if (state === 'dying') {
    dieTimer -= dt;
    if (dieTimer <= 0) { state = 'over'; newBest = score > best; best = Math.max(best, score); }
  }

  debris.forEach(d => { d.vy += 900 * dt; d.x += d.vx * dt; d.y += d.vy * dt; d.rot += d.vr * dt; });
  debris = debris.filter(d => d.y + cam < H + 200);

  particles.forEach(p => { p.vy += 500 * dt; p.x += p.vx * dt; p.y += p.vy * dt; p.life -= dt; });
  particles = particles.filter(p => p.life > 0);

  popups.forEach(p => { p.y -= 40 * dt; p.life -= dt * 0.9; });
  popups = popups.filter(p => p.life > 0);
}

// ---- 描画 ----
function lerp(a, b, t) { return a + (b - a) * t; }
function phaseColors() {
  const s = score || 0;
  let i = 0;
  while (i < PHASES.length - 1 && s >= PHASES[i + 1].at) i++;
  const a = PHASES[i], b = PHASES[Math.min(i + 1, PHASES.length - 1)];
  const span = (b.at - a.at) || 1;
  const t = Math.min(Math.max((s - a.at) / span, 0), 1);
  const mix = (c1, c2) => `rgb(${c1.map((v,k)=>Math.round(lerp(v,c2[k],t))).join(',')})`;
  return { top: mix(a.top, b.top), bot: mix(a.bot, b.bot), darkT: lerp(a.dark?1:0, b.dark?1:0, t) };
}

function drawBlock(x, yScreen, w, f, rot) {
  ctx.save();
  if (rot) { ctx.translate(x + w/2, yScreen + BLOCK_H/2); ctx.rotate(rot); ctx.translate(-(x + w/2), -(yScreen + BLOCK_H/2)); }
  // 本体(ようかんの切り身)
  ctx.fillStyle = f.main;
  roundRect(x, yScreen, w, BLOCK_H, 6); ctx.fill();
  // 上面のツヤ
  ctx.fillStyle = f.top;
  roundRect(x, yScreen, w, 9, 6); ctx.fill();
  // 側面の影
  ctx.fillStyle = f.side;
  ctx.fillRect(x + 3, yScreen + BLOCK_H - 5, w - 6, 5);
  // ごま粒テクスチャ
  ctx.fillStyle = 'rgba(0,0,0,0.12)';
  const n = Math.max(2, Math.floor(w / 40));
  for (let i = 0; i < n; i++) {
    const px = x + ((i + 0.5) / n) * w + Math.sin(i * 7 + yScreen) * 5;
    ctx.beginPath(); ctx.arc(px, yScreen + 22 + Math.sin(i * 13) * 6, 1.6, 0, 6.28); ctx.fill();
  }
  ctx.restore();
}

function roundRect(x, y, w, h, r) {
  r = Math.min(r, w/2, h/2);
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}

function draw(t) {
  const ph = phaseColors();
  const g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, ph.top); g.addColorStop(1, ph.bot);
  ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);

  // 星(夜フェーズ)
  if (ph.darkT > 0.05) {
    ctx.save(); ctx.globalAlpha = ph.darkT;
    ctx.fillStyle = '#FFF8E0';
    stars.forEach(s => {
      const a = 0.4 + 0.6 * Math.abs(Math.sin(t * 1.5 + s.tw));
      ctx.globalAlpha = ph.darkT * a;
      ctx.beginPath(); ctx.arc(s.x * W, s.y * H * 0.7, s.r, 0, 6.28); ctx.fill();
    });
    ctx.restore();
  }
  // 雲(昼フェーズ)
  if (ph.darkT < 0.7) {
    ctx.save(); ctx.globalAlpha = (1 - ph.darkT) * 0.5;
    ctx.fillStyle = '#FFFFFF';
    clouds.forEach(c => {
      const cx = c.x * W, cy = c.y * H * 0.5 + 40, s = c.s * 26;
      ctx.beginPath();
      ctx.arc(cx, cy, s, 0, 6.28);
      ctx.arc(cx + s * 0.9, cy + s * 0.25, s * 0.7, 0, 6.28);
      ctx.arc(cx - s * 0.9, cy + s * 0.25, s * 0.7, 0, 6.28);
      ctx.fill();
    });
    ctx.restore();
  }

  ctx.save();
  const sx = (Math.random() - 0.5) * shake, sy = (Math.random() - 0.5) * shake;
  ctx.translate(sx, sy + 0); // shake

  // 皿(土台)
  const plateY = H - 90 + cam;
  if (plateY < H + 60) {
    ctx.fillStyle = ph.darkT > 0.5 ? '#C9B8A0' : '#FFFFFF';
    roundRect(W/2 - baseWidth()/2 - 30, plateY, baseWidth() + 60, 14, 7); ctx.fill();
    ctx.fillStyle = 'rgba(0,0,0,0.12)';
    roundRect(W/2 - baseWidth()/2 - 12, plateY + 14, baseWidth() + 24, 6, 3); ctx.fill();
  }

  // タワー
  for (let i = 0; i < blocks.length; i++) {
    const y = topY(i) + cam;
    if (y > -BLOCK_H && y < H + BLOCK_H) drawBlock(blocks[i].x, y, blocks[i].w, blocks[i].f, 0);
  }
  // 動くブロック
  if (state === 'playing') {
    drawBlock(current.x, topY(blocks.length) + cam, current.w, current.f, 0);
    // ガイドライン(直前ブロックの端)
    const prev = blocks[blocks.length - 1];
    ctx.strokeStyle = ph.darkT > 0.5 ? 'rgba(255,255,255,0.25)' : 'rgba(0,0,0,0.15)';
    ctx.setLineDash([4, 6]); ctx.lineWidth = 1;
    const gy = topY(blocks.length) + cam;
    ctx.beginPath();
    ctx.moveTo(prev.x, gy - 14); ctx.lineTo(prev.x, gy + BLOCK_H + 6);
    ctx.moveTo(prev.x + prev.w, gy - 14); ctx.lineTo(prev.x + prev.w, gy + BLOCK_H + 6);
    ctx.stroke(); ctx.setLineDash([]);
  }

  // 落下する切れ端
  debris.forEach(d => drawBlock(d.x, d.y + cam, d.w, d.f, d.rot));

  // パーティクル
  particles.forEach(p => {
    ctx.globalAlpha = Math.min(p.life, 1);
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - 3, p.y + cam - 3, 6, 6);
  });
  ctx.globalAlpha = 1;

  // ポップアップ
  popups.forEach(p => {
    ctx.globalAlpha = Math.min(p.life * 1.5, 1);
    ctx.textAlign = 'center';
    ctx.fillStyle = ph.darkT > 0.5 ? '#FFF3D6' : '#5A3E36';
    ctx.font = "bold 26px 'Hiragino Maru Gothic ProN', 'Yu Gothic', sans-serif";
    ctx.fillText(p.text, p.x, p.y + cam - 16);
    ctx.font = "bold 16px sans-serif";
    ctx.fillText(p.sub, p.x, p.y + cam + 6);
  });
  ctx.globalAlpha = 1;
  ctx.restore();

  // ぴったりフラッシュ
  if (flash > 0) {
    ctx.fillStyle = `rgba(255,255,255,${flash * 0.22})`;
    ctx.fillRect(0, 0, W, H);
  }

  // ---- UI ----
  const ink = ph.darkT > 0.5 ? '#FFF6E5' : '#4A352D';
  ctx.textAlign = 'center';
  if (state === 'playing' || state === 'dying') {
    ctx.fillStyle = ink;
    ctx.font = "bold 56px 'Hiragino Maru Gothic ProN', 'Yu Gothic', sans-serif";
    ctx.fillText(score, W/2, 86);
    if (combo >= 2) {
      ctx.font = "bold 18px sans-serif";
      ctx.fillText('🔥 ' + combo + ' コンボ', W/2, 116);
    }
  }
  if (state === 'title') {
    ctx.fillStyle = ink;
    ctx.font = "bold 44px 'Hiragino Maru Gothic ProN', 'Yu Gothic', serif";
    ctx.fillText('ようかんタワー', W/2, H * 0.30);
    ctx.font = "16px sans-serif";
    ctx.fillText('タップでようかんを積む。', W/2, H * 0.30 + 40);
    ctx.fillText('ぴったり重ねるとコンボ&幅が復活!', W/2, H * 0.30 + 64);
    const pulse = 0.6 + 0.4 * Math.abs(Math.sin(t * 2.5));
    ctx.globalAlpha = pulse;
    ctx.font = "bold 22px sans-serif";
    ctx.fillText('▼ タップでスタート ▼', W/2, H * 0.62);
    ctx.globalAlpha = 1;
    // タイトル用の見本タワー
    const demoW = 120;
    for (let i = 0; i < 3; i++) drawBlock(W/2 - demoW/2 + (i===1?8:0), H * 0.72 + (2 - i) * BLOCK_H, demoW - (i===1?16:0), FLAVORS[i], 0);
  }
  if (state === 'over') {
    ctx.fillStyle = ph.darkT > 0.5 ? 'rgba(10,8,16,0.55)' : 'rgba(60,40,30,0.35)';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#FFF6E5';
    ctx.font = "bold 34px 'Hiragino Maru Gothic ProN', 'Yu Gothic', sans-serif";
    ctx.fillText('ごちそうさま!', W/2, H * 0.36);
    ctx.font = "bold 64px sans-serif";
    ctx.fillText(score, W/2, H * 0.36 + 80);
    ctx.font = "16px sans-serif";
    ctx.fillText(newBest ? '✨ 自己ベスト更新! ✨' : 'ベスト: ' + best, W/2, H * 0.36 + 116);
    const pulse = 0.6 + 0.4 * Math.abs(Math.sin(t * 2.5));
    ctx.globalAlpha = pulse;
    ctx.font = "bold 20px sans-serif";
    ctx.fillText('タップでもう一回', W/2, H * 0.66);
    ctx.globalAlpha = 1;
  }
}

reset();
state = 'title';
requestAnimationFrame(loop);
</script>
</body>
</html>
